<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
        window.onload = inicio;

        function inicio() {
            let btn = document.getElementById('botao');
            btn.addEventListener('click', processar);
        }

        function processar() {
            let campo = document.getElementById('entrada');
            let texto = campo.value;
            let linhas = texto.split('\n');
            let saida = document.getElementById('saida');
            saida.innerHTML = '';

            linhas.forEach(function(linha) {
                if (linha.trim() === '') return;

                let p = document.createElement('p');
                let icone = document.createElement('span');
                icone.classList.add('material-symbols-outlined');
                let conteudo = linha.slice(1).trim();

                if (linha.startsWith('.')) {
                    icone.textContent = 'check_box_outline_blank';
                    p.appendChild(icone);
                    p.appendChild(document.createTextNode(' ' + conteudo));

                } else if (linha.startsWith('x')) {
                    icone.textContent = 'check_box';
                    p.appendChild(icone);
                    p.appendChild(document.createTextNode(' ' + conteudo));

                } else if (linha.startsWith('-')) {
                    let del = document.createElement('del');
                    del.textContent = linha;
                    p.appendChild(del);

                } else if (linha.startsWith('_')) {
                    let em = document.createElement('em');
                    em.textContent = linha;
                    p.appendChild(em);

                } else {
                    p.textContent = linha;
                }

                saida.appendChild(p);
            });
        }
    </script>
</head>

<body>
    <label for="entrada">Tarefas:</label><br>
    <textarea id="entrada" rows="8" cols="40" placeholder=". estudar para prova
x marcar médico
- reunião amanhã!!!
_ gostei do óculos da Yop"></textarea>
    <br>
    <button id="botao">Processar</button>
    <div id="saida"></div>
</body>

</html>
